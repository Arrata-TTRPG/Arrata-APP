# Thanks to https://github.com/NiklasEi/bevy_game_template/blob/main/.github/workflows/release.yaml for much of this code
on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      - "v*" # Push events to matching v*, i.e. v1.0, v20.15.10
      - "V*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version - in the form of v1.2.3"
        required: true
        type: string

env:
  EXECUTABLE_NAME: "arrata_app"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: write-all

name: Create release
jobs:
  get-version:
    runs-on: ubuntu-latest
    steps:
      - name: Get tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
    outputs:
      version: ${{ inputs.version || steps.tag.outputs.tag }}

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: get-version
    env:
      VERSION: ${{needs.get-version.outputs.version}}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Verify version or get latest
        if: ${{ needs.get-version.outputs.version != 'v*' }}
        uses: WyriHaximus/github-action-get-previous-tag@v1.4.0
        id: get-latest-tag
        with:
          fallback: "0.0.0"

      - name: Update version
        if: ${{ needs.get-version.outputs.version != 'v*' }}
        run: |
          echo "VERSION=${{ steps.get-latest-tag.outputs.tag }}" >> $GITHUB_ENV

      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --verbose --latest
        env:
          OUTPUT: CHANGELOG.md

      - name: Create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # This token is provided by Actions, you do not need to create your own token
        with:
          tag_name: ${{ env.VERSION }}
          release_name: Release ${{ env.VERSION }}
          body_path: ${{ steps.git-cliff.outputs.changelog }}
          draft: false
          prerelease: false
    outputs:
      tag: ${{ env.VERSION }}

  build-web:
    runs-on: ubuntu-latest
    needs: [get-version, create-release]
    env:
      VERSION: ${{ needs.create-release.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Apply Version
        run: sed -i "s/v0.0.0/${{ env.VERSION }}/g" src/lib.rs

      - uses: nixbuild/nix-quick-install-action@v30
        with:
          nix_conf: |
            keep-env-derivations = true
            keep-outputs = true
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Restore Nix cache
        uses: nix-community/cache-nix-action/restore@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}-release
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}-release
          paths: |
            ~/.cargo
            target
      - name: Fix permissions
        continue-on-error: true
        run: |
          sudo chmod 777 ~/.cargo/**
          sudo chmod 777 target/**

      - name: Create CSS
        run: |
          nix develop -c tailwindcss -i input.css -o public/tailwind.css --minify

      - name: Modify Dioxus.toml
        run: |
          sed -i 's/#base_path/base_path/' Dioxus.toml

      - name: Create WASM with Dioxus CLI
        run: |
          nix develop -c dx build --release --platform web
          mv target/dx/arrata_app/release/web/public docs

      - name: Deploy to GH Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: web-deployment
          folder: docs
          target-folder: docs
          commit-message: "chore(cd): Deploy to GH Pages for ${{ env.VERSION }}"

      - name: Delete release caches from old tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh cache list --repo ${{ github.repository }} --key nix- --json id,ref,key \
            | jq -r '.[] | select((.key | endswith("-release")) and .ref != "refs/heads/main") | .id' \
            | xargs -r -I {} gh cache delete {} --repo ${{ github.repository }}

      - name: Save cache
        if: always()
        uses: nix-community/cache-nix-action/save@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}-release
          paths: |
            ~/.cargo
            target
