# Thanks to https://github.com/NiklasEi/bevy_game_template/blob/main/.github/workflows/release.yaml for much of this code
on:
  push:
    branches: ["main"]
    paths:
      - src/**
      - Cargo.toml
      - Cargo.lock
      - .github/workflows/cargo-verify.yaml
  pull_request:
    branches: ["main"]
    paths:
      - src/**
      - Cargo.toml
      - Cargo.lock
      - .github/workflows/cargo-verify.yaml

env:
  CARGO_INCREMENTAL: 1
  NODE_VERSION: 20

permissions: write-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

name: Run Rust checks across all platforms
jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Nix
        run: |
          nix-channel --add https://nixos.org/channels/nixpkgs-unstable
          nix-channel --update
      - name: Build tailwindcss
        run: nix develop -c tailwindcss build -i input.css -o public/tailwind.css
      - name: dx build
        run: nix develop -c dx build --platform web
      - name: Cargo Check
        run: nix develop -c cargo check --all
      - name: Cargo Test
        run: nix develop -c cargo test --all
      - name: Cargo Clippy
        run: nix develop -c cargo clippy --all
      - name: Cargo fmt
        run: nix develop -c cargo fmt -- --check
